name: Score Submission

on:
  pull_request:
    paths:
      - "submissions/*.csv"

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies in correct order
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric
          pip install pandas scikit-learn -r starter_code/requirements.txt

      # 4️⃣ Create hidden ground truth CSV from secret
      - name: Create hidden test labels
        run: echo "${{ secrets.TESTREAL }}" > ground_truth.csv

      # 5️⃣ Run scoring for each submission CSV
      - name: Run scoring
        run: |
          for file in submissions/*.csv; do
            echo "Scoring $file"
            python scoring_script.py "$file" ground_truth.csv
          done

      # 6️⃣ Update leaderboard
      - name: Update leaderboard
        run: python update_leaderboard.py